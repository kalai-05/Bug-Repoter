<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1363"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="128" height="128" rx="28" fill="url(#glow)"/>

  <!-- Antennae -->
  <line x1="50" y1="29" x2="34" y2="11" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <line x1="78" y1="29" x2="94" y2="11" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.90"/>
  <circle cx="32" cy="9"  r="5.5" fill="white" opacity="0.90"/>
  <circle cx="96" cy="9"  r="5.5" fill="white" opacity="0.90"/>

  <!-- Head -->
  <circle cx="64" cy="38" r="19" fill="white"/>

  <!-- Eyes -->
  <circle cx="55" cy="36" r="5" fill="#4f46e5"/>
  <circle cx="73" cy="36" r="5" fill="#4f46e5"/>
  <circle cx="56.5" cy="34.5" r="2" fill="white" opacity="0.75"/>
  <circle cx="74.5" cy="34.5" r="2" fill="white" opacity="0.75"/>

  <!-- Body -->
  <ellipse cx="64" cy="82" rx="26" ry="33" fill="white"/>

  <!-- Body split line -->
  <line x1="64" y1="56" x2="64" y2="113" stroke="#c4c5f0" stroke-width="2" opacity="0.55"/>

  <!-- Left legs -->
  <line x1="38" y1="68" x2="17" y2="60" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
  <line x1="38" y1="82" x2="16" y2="82" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
  <line x1="38" y1="96" x2="17" y2="104" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>

  <!-- Right legs -->
  <line x1="90" y1="68" x2="111" y2="60" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
  <line x1="90" y1="82" x2="112" y2="82" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
  <line x1="90" y1="96" x2="111" y2="104" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.92"/>
</svg>
